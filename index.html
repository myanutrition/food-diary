<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Дневник питания</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --acc: #e65c13; --acc-light: #fff5ef; --acc-mid: #f4b48a;
  --bg: #faf8f5; --card: #fff; --border: #ede9e3;
  --text: #1c1a18; --muted: #9a9590; --r: 16px; --rs: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 2rem; }

header { padding: 1.5rem 1rem 1rem; background: var(--card); border-bottom: 1px solid var(--border); margin-bottom: 1rem; text-align: center; }
header h1 { font-size: 20px; font-weight: 600; color: var(--text); }
header p { font-size: 13px; color: var(--muted); margin-top: 3px; font-weight: 300; }

.container { max-width: 480px; margin: 0 auto; padding: 0 1rem; }

.date-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; padding: 8px 12px; background: var(--card); border-radius: var(--rs); border: 1px solid var(--border); }
.date-row label { font-size: 12px; color: var(--muted); font-weight: 400; text-transform: uppercase; letter-spacing: .05em; }
.date-row input[type=date] { font-family: 'Outfit', sans-serif; font-size: 14px; border: none; background: transparent; color: var(--text); outline: none; }

/* MEAL CARD */
.meal-card { background: var(--card); border-radius: var(--r); border: 1px solid var(--border); margin-bottom: 14px; overflow: visible; }

/* MODE TOGGLE */
.mode-toggle { display: flex; gap: 0; padding: 10px 12px 0; }
.mode-btn { flex: 1; padding: 7px; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500; border: 1px solid var(--border); background: var(--bg); color: var(--muted); cursor: pointer; transition: all .15s; }
.mode-btn:first-child { border-radius: var(--rs) 0 0 var(--rs); }
.mode-btn:last-child { border-radius: 0 var(--rs) var(--rs) 0; border-left: none; }
.mode-btn.active { background: var(--acc); border-color: var(--acc); color: #fff; }

/* PHOTO AREA */
.photo-wrap { position: relative; margin: 10px 12px 0; border-radius: var(--rs); overflow: hidden; }
.photo-box { width: 100%; aspect-ratio: 1/1; background: var(--acc-light); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; border-radius: var(--rs); overflow: hidden; z-index: 0; }
.photo-box img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
.photo-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--acc-mid); }
.photo-placeholder svg { width: 36px; height: 36px; }
.photo-placeholder span { font-size: 13px; color: var(--muted); }
.photo-box input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

/* TEXT AREA */
.text-box { width: 100%; aspect-ratio: 1/1; background: var(--acc-light); border-radius: var(--rs); display: flex; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }
.text-input { width: 100%; height: 100%; border: none; background: transparent; font-family: 'Outfit', sans-serif; font-size: 15px; color: var(--text); resize: none; outline: none; text-align: center; line-height: 1.6; }
.text-input::placeholder { color: var(--muted); }

/* FIELDS */
.meal-fields { display: flex; gap: 8px; padding: 10px 12px 4px; align-items: center; }
.meal-fields input[type=text] { flex: 1; font-family: 'Outfit', sans-serif; font-size: 14px; padding: 8px 12px; border-radius: var(--rs); border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
.meal-fields input[type=text]:focus { border-color: var(--acc-mid); }
.meal-fields input[type=time] { font-family: 'Outfit', sans-serif; font-size: 14px; padding: 8px 10px; border-radius: var(--rs); border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; min-width: 96px; }
.meal-fields input[type=time]:focus { border-color: var(--acc-mid); }

/* BOTTOM ROW */
.meal-bottom { display: flex; justify-content: flex-end; padding: 2px 12px 10px; }
.remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; padding: 4px 8px; border-radius: 8px; transition: color .15s; }
.remove-btn:hover { color: #e24b4a; }

/* BUTTONS */
.add-btn { width: 100%; padding: 13px; border: 1.5px dashed var(--border); border-radius: var(--r); background: none; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 1rem; transition: all .2s; }
.add-btn:hover { border-color: var(--acc-mid); color: var(--acc); background: var(--acc-light); }
.add-btn svg { width: 16px; height: 16px; }
.preview-btn { width: 100%; padding: 14px; border-radius: var(--r); border: 1.5px solid var(--acc); background: var(--acc-light); color: var(--acc); font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: .04em; cursor: pointer; margin-bottom: 10px; transition: all .2s; }
.preview-btn:hover { background: var(--acc); color: #fff; }
.download-btn { width: 100%; padding: 14px; border-radius: var(--r); border: none; background: var(--acc); color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: .04em; cursor: pointer; transition: background .2s, transform .1s; }
.download-btn:hover { background: #c94f0e; }
.download-btn:active { transform: scale(.98); }

/* PREVIEW MODAL */
.preview-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.preview-overlay.open { display: flex; }
.preview-modal { background: var(--card); border-radius: 20px; overflow: hidden; max-width: 480px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; }
.preview-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--border); }
.preview-header h3 { font-size: 16px; font-weight: 600; color: var(--text); }
.preview-close { background: none; border: none; font-size: 22px; color: var(--muted); cursor: pointer; padding: 0 4px; }
.preview-body { overflow-y: auto; padding: 16px; display: flex; align-items: center; justify-content: center; }
.preview-body img { width: 100%; border-radius: var(--rs); }
.preview-footer { padding: 12px 16px 16px; border-top: 1px solid var(--border); }
.preview-save-btn { width: 100%; padding: 13px; border-radius: var(--rs); border: none; background: var(--acc); color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }

/* BOTTOM SHEET */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 100; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.sheet { background: var(--card); border-radius: 20px 20px 0 0; padding: 1.25rem 1rem 2rem; width: 100%; max-width: 480px; }
.sheet h3 { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 1rem; }
.sheet-btn { width: 100%; padding: 13px; border-radius: var(--rs); border: 1px solid var(--border); background: var(--bg); font-family: 'Outfit', sans-serif; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; transition: background .15s; }
.sheet-btn:hover { background: var(--acc-light); border-color: var(--acc-mid); }
.sheet-btn svg { width: 20px; height: 20px; color: var(--acc); flex-shrink: 0; }
.sheet-cancel { width: 100%; padding: 12px; border: none; background: none; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 14px; cursor: pointer; margin-top: 4px; }
#file-camera, #file-gallery { display: none; }
</style>
</head>
<body>

<header>
  <h1>Дневник питания</h1>
  <p>фото или текст каждого приёма — коллаж дня</p>
</header>

<div class="container">
  <div class="date-row">
    <label>Дата</label>
    <input type="date" id="diary-date"/>
  </div>
  <div id="meals-container"></div>
  <button class="add-btn" onclick="addMeal()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
    Добавить приём пищи
  </button>
  <button class="preview-btn" onclick="previewCollage()">👁 Предпросмотр коллажа</button>
  <button class="download-btn" onclick="downloadCollage()">Скачать коллаж дня</button>
</div>

<!-- Photo bottom sheet -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="sheet">
    <h3>Добавить фото</h3>
    <button class="sheet-btn" onclick="triggerCamera()">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/></svg>
      Сделать фото
    </button>
    <button class="sheet-btn" onclick="triggerGallery()">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
      Выбрать из галереи
    </button>
    <button class="sheet-cancel" onclick="closeSheet()">Отмена</button>
  </div>
</div>

<input type="file" id="file-camera" accept="image/*" capture="environment" onchange="handlePhoto(event)"/>
<input type="file" id="file-gallery" accept="image/*" onchange="handlePhoto(event)"/>

<!-- PREVIEW MODAL -->
<div class="preview-overlay" id="preview-overlay" onclick="closePreview(event)">
  <div class="preview-modal">
    <div class="preview-header">
      <h3>Предпросмотр коллажа</h3>
      <button class="preview-close" onclick="closePreviewModal()">✕</button>
    </div>
    <div class="preview-body">
      <img id="preview-img" src="" alt="Предпросмотр коллажа"/>
    </div>
    <div class="preview-footer">
      <button class="preview-save-btn" onclick="saveFromPreview()" id="save-btn">Сохранить фото</button>
    </div>
  </div>
</div>

<script>
let meals = [], counter = 0, activeId = null;
const defaultNames = ['Завтрак','Перекус','Обед','Перекус 2','Ужин','Перекус 3'];

document.getElementById('diary-date').value = new Date().toISOString().split('T')[0];

function addMeal() {
  const id = ++counter;
  const now = new Date();
  const time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  meals.push({ id, label: '', time, imgSrc: null, mode: 'photo', text: '' });
  renderMeals();
}

function renderMeals() {
  const c = document.getElementById('meals-container');
  c.innerHTML = '';
  meals.forEach((meal, idx) => {
    const placeholder = defaultNames[idx] || ('Приём ' + (idx+1));
    const div = document.createElement('div');
    div.className = 'meal-card';
    div.innerHTML = `
      <div class="mode-toggle">
        <button class="mode-btn ${meal.mode==='photo'?'active':''}" onclick="setMode(${meal.id},'photo')">📷 Фото</button>
        <button class="mode-btn ${meal.mode==='text'?'active':''}" onclick="setMode(${meal.id},'text')">✏️ Текст</button>
      </div>
      <div class="photo-wrap">
        ${meal.mode === 'photo' ? `
          <div class="photo-box" ${meal.imgSrc ? '' : `onclick="openSheet(${meal.id})"`}>
            ${meal.imgSrc
              ? `<img src="${meal.imgSrc}" alt="Фото"/>`
              : `<div class="photo-placeholder">
                  <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/></svg>
                  <span>Нажмите чтобы добавить фото</span>
                </div>`
            }
            ${meal.imgSrc ? `<div style="position:absolute;inset:0;cursor:pointer;" onclick="openSheet(${meal.id})"></div>` : ''}
          </div>
        ` : `
          <div class="text-box">
            <textarea class="text-input" placeholder="Опишите что вы ели..." oninput="updateText(${meal.id},this.value)">${meal.text}</textarea>
          </div>
        `}
      </div>
      <div class="meal-fields">
        <input type="text" placeholder="${placeholder}" value="${meal.label}" oninput="updateLabel(${meal.id},this.value)"/>
        <input type="time" value="${meal.time}" onchange="updateTime(${meal.id},this.value)"/>
      </div>
      <div class="meal-bottom">
        <button class="remove-btn" onclick="removeMeal(${meal.id})">✕</button>
      </div>
    `;
    c.appendChild(div);
  });
}

function setMode(id, mode) {
  const m = meals.find(m => m.id === id);
  if (m) { m.mode = mode; renderMeals(); }
}
function updateLabel(id, v) { const m = meals.find(m=>m.id===id); if(m) m.label=v; }
function updateTime(id, v) { const m = meals.find(m=>m.id===id); if(m) m.time=v; }
function updateText(id, v) { const m = meals.find(m=>m.id===id); if(m) m.text=v; }
function removeMeal(id) { meals = meals.filter(m=>m.id!==id); renderMeals(); }

function openSheet(id) { activeId = id; document.getElementById('overlay').classList.add('open'); }
function closeSheet() { document.getElementById('overlay').classList.remove('open'); activeId = null; }
function closeOverlay(e) { if(e.target===document.getElementById('overlay')) closeSheet(); }
function triggerCamera() { document.getElementById('file-camera').click(); }
function triggerGallery() { document.getElementById('file-gallery').click(); }

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file || activeId === null) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const m = meals.find(m=>m.id===activeId);
    if (m) { m.imgSrc = ev.target.result; renderMeals(); }
    closeSheet(); e.target.value = '';
  };
  reader.readAsDataURL(file);
}

function loadImage(src) {
  return new Promise((res,rej) => { const img = new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=src; });
}

let lastCollageDataUrl = null;

async function previewCollage() {
  if (meals.length === 0) { alert('Сначала добавьте хотя бы один приём пищи!'); return; }
  const dataUrl = await buildCollage();
  if (!dataUrl) return;
  lastCollageDataUrl = dataUrl;
  document.getElementById('preview-img').src = dataUrl;
  document.getElementById('preview-overlay').classList.add('open');
}

function closePreviewModal() {
  document.getElementById('preview-overlay').classList.remove('open');
}

function closePreview(e) {
  if (e.target === document.getElementById('preview-overlay')) closePreviewModal();
}

function saveFromPreview() {
  if (!lastCollageDataUrl) return;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS) {
    // iOS: open in new tab - user saves with long press
    const w = window.open();
    w.document.write('<html><head><meta name="viewport" content="width=device-width"/><style>body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;}img{max-width:100%;}</style></head><body><img src="' + lastCollageDataUrl + '"/><p style="color:#fff;text-align:center;padding:10px;font-family:sans-serif;font-size:14px;">Нажмите и удержите фото → Сохранить в фото</p></body></html>');
    w.document.close();
  } else {
    const dateVal = document.getElementById('diary-date').value;
    const link = document.createElement('a');
    link.download = 'дневник-' + (dateVal||'сегодня') + '.png';
    link.href = lastCollageDataUrl;
    link.click();
  }
  closePreviewModal();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawCoverImage(ctx, img, x, y, size) {
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const scale = Math.max(size/iw, size/ih);
  const sw = size/scale, sh = size/scale;
  ctx.drawImage(img, (iw-sw)/2, (ih-sh)/2, sw, sh, x, y, size, size);
}

async function buildCollage() {
  const dateVal = document.getElementById('diary-date').value;
  const dateLabel = dateVal ? new Date(dateVal+'T12:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'}) : '';

  const COLS = meals.length === 1 ? 1 : 2;
  const GAP = 8, OUTER = 12;
  const DATE_H = dateLabel ? 40 : 0;
  const ROWS = Math.ceil(meals.length / COLS);
  const TOTAL_W = 720;
  const IMG_SIZE = Math.floor((TOTAL_W - OUTER*2 - (COLS-1)*GAP) / COLS);
  const PILL_H = 44;
  const W = OUTER*2 + COLS*IMG_SIZE + (COLS-1)*GAP;
  const CELL_H = IMG_SIZE + PILL_H;
  const H = DATE_H + OUTER + ROWS*CELL_H + (ROWS-1)*GAP + OUTER;

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#faf8f5';
  ctx.fillRect(0,0,W,H);

  if (dateLabel) {
    ctx.fillStyle = '#9a9590';
    ctx.font = '300 18px Outfit, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(dateLabel.toUpperCase(), W/2, 26);
    ctx.strokeStyle = '#ede9e3'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(OUTER,33); ctx.lineTo(W-OUTER,33); ctx.stroke();
  }

  const names = ['Завтрак','Перекус','Обед','Перекус 2','Ужин','Перекус 3'];

  for (let i = 0; i < meals.length; i++) {
    const meal = meals[i];
    const col = i % COLS, row = Math.floor(i / COLS);
    const x = OUTER + col*(IMG_SIZE+GAP);
    const y = DATE_H + OUTER + row*(CELL_H+GAP);

    // Photo or text area
    ctx.save();
    roundRect(ctx, x, y, IMG_SIZE, IMG_SIZE, 14);
    ctx.clip();

    if (meal.mode === 'photo' && meal.imgSrc) {
      const img = await loadImage(meal.imgSrc);
      drawCoverImage(ctx, img, x, y, IMG_SIZE);
    } else if (meal.mode === 'text' && meal.text) {
      ctx.fillStyle = '#fff5ef';
      ctx.fillRect(x, y, IMG_SIZE, IMG_SIZE);
      ctx.textAlign = 'center';
      const maxW = IMG_SIZE - 60;
      const words = meal.text.split(' ');

      // Find best font size that fits
      let fontSize = 48;
      let lines = [];
      while (fontSize >= 20) {
        ctx.font = `500 ${fontSize}px Outfit, sans-serif`;
        lines = [];
        let line = '';
        for (const word of words) {
          const test = line ? line+' '+word : word;
          if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = word; }
          else line = test;
        }
        if (line) lines.push(line);
        const totalH = lines.length * (fontSize * 1.35);
        if (totalH <= IMG_SIZE - 80) break;
        fontSize -= 4;
      }

      ctx.font = `500 ${fontSize}px Outfit, sans-serif`;
      ctx.fillStyle = '#1c1a18';
      const lineH = fontSize * 1.4;
      const startY = y + IMG_SIZE/2 - (lines.length - 1) * lineH / 2;
      lines.forEach((l, li) => ctx.fillText(l, x + IMG_SIZE/2, startY + li * lineH));
    } else {
      ctx.fillStyle = '#f4efe8';
      ctx.fillRect(x, y, IMG_SIZE, IMG_SIZE);
      ctx.fillStyle = '#c8c3bc'; ctx.font = '300 18px Outfit, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('нет фото', x+IMG_SIZE/2, y+IMG_SIZE/2+6);
    }
    ctx.restore();

    // Pill label at bottom edge of photo
    const labelText = meal.label || names[i] || ('Приём '+(i+1));
    const fullText = labelText + '  ' + (meal.time||'');
    ctx.font = '500 17px Outfit, sans-serif';
    const nameTextW = ctx.measureText(labelText).width;
    ctx.font = '400 16px Outfit, sans-serif';
    const timeTextW = ctx.measureText(meal.time||'').width;
    const textW = nameTextW + 20 + timeTextW;
    const pillW = textW + 48, pillH = 38, pillR = 19;
    const px = x + IMG_SIZE/2 - pillW/2;
    const py = y + IMG_SIZE - pillH/2;

    ctx.fillStyle = '#fff';
    roundRect(ctx, px, py, pillW, pillH, pillR);
    ctx.fill();
    ctx.strokeStyle = '#ede9e3'; ctx.lineWidth = 1;
    roundRect(ctx, px, py, pillW, pillH, pillR);
    ctx.stroke();

    ctx.fillStyle = '#1c1a18';
    ctx.font = '500 17px Outfit, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(labelText, px+16, py+pillH/2+6);

    ctx.fillStyle = '#e65c13';
    ctx.font = '400 16px Outfit, sans-serif';
    const nameW = ctx.measureText(labelText).width;
    ctx.fillText(meal.time||'', px+16+nameW+20, py+pillH/2+6);
  }

  return canvas.toDataURL('image/png');
}

async function downloadCollage() {
  if (meals.length === 0) { alert('Сначала добавьте хотя бы один приём пищи!'); return; }
  const dataUrl = await buildCollage();
  if (!dataUrl) return;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS) {
    const w = window.open();
    w.document.write('<html><head><meta name="viewport" content="width=device-width"/><style>body{margin:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}img{max-width:100%;}</style></head><body><img src="' + dataUrl + '"/><p style="color:#fff;text-align:center;padding:10px;font-family:sans-serif;font-size:14px;">Нажмите и удержите фото → Сохранить в фото</p></body></html>');
    w.document.close();
  } else {
    const dateVal = document.getElementById('diary-date').value;
    const link = document.createElement('a');
    link.download = 'дневник-' + (dateVal||'сегодня') + '.png';
    link.href = dataUrl;
    link.click();
  }
}

addMeal();
</script>
