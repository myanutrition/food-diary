<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Дневник питания</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent: #e65c13;
    --accent-light: #fff5ef;
    --accent-mid: #f4b48a;
    --bg: #faf8f5;
    --card: #ffffff;
    --border: #ede9e3;
    --text: #1c1a18;
    --muted: #9a9590;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 3rem; }

  header { padding: 1.25rem 1rem 0.875rem; text-align: center; border-bottom: 1px solid var(--border); background: var(--card); margin-bottom: 1rem; }
  header h1 { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; }
  header p { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 300; letter-spacing: 0.03em; }

  .container { max-width: 480px; margin: 0 auto; padding: 0 0.75rem; }

  .date-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; padding: 8px 12px; background: var(--card); border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .date-row label { font-size: 11px; color: var(--muted); font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase; }
  .date-row input[type=date] { font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 400; border: none; background: transparent; color: var(--text); outline: none; }

  .meal-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px; }
  .meal-card:focus-within { box-shadow: 0 0 0 2px var(--accent-mid); border-color: transparent; }

  .photo-box { position: relative; width: 100%; aspect-ratio: 1/1; background: var(--accent-light); overflow: hidden; cursor: pointer; }
  .photo-box img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
  .photo-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .photo-placeholder svg { width: 32px; height: 32px; color: var(--accent-mid); }
  .photo-placeholder span { font-size: 13px; font-weight: 400; color: var(--muted); }
  .photo-placeholder small { font-size: 11px; color: var(--accent-mid); }

  .meal-fields { display: flex; gap: 6px; padding: 6px 10px; align-items: center; }
  .meal-fields input[type=text] { flex: 1; font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 400; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
  .meal-fields input[type=text]:focus { border-color: var(--accent-mid); }
  .meal-fields .divider { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }
  .meal-fields input[type=time] { font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 400; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; min-width: 88px; }
  .meal-fields input[type=time]:focus { border-color: var(--accent-mid); }
  .remove-btn { background: none; border: none; color: #d0ccc6; cursor: pointer; font-size: 16px; line-height: 1; padding: 5px; border-radius: 6px; transition: color 0.2s, background 0.2s; flex-shrink: 0; }
  .remove-btn:hover { color: #e24b4a; background: #fff0f0; }

  .add-btn { width: 100%; padding: 12px; border: 1.5px dashed var(--border); border-radius: var(--radius); background: none; color: var(--muted); font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 400; letter-spacing: 0.04em; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 0.75rem; transition: border-color 0.2s, color 0.2s, background 0.2s; }
  .add-btn:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-light); }
  .add-btn svg { width: 15px; height: 15px; }

  .preview-btn { width: 100%; padding: 14px; border-radius: var(--radius); border: 1.5px solid var(--accent); background: none; color: var(--accent); font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 0.6rem; transition: background 0.2s; }
  .preview-btn:hover { background: var(--accent-light); }
  .preview-btn svg { width: 17px; height: 17px; }

  .download-btn { width: 100%; padding: 14px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s, transform 0.1s; }
  .download-btn:hover { background: #c94f0e; }
  .download-btn:active { transform: scale(0.98); }
  .download-btn svg { width: 17px; height: 17px; }

  /* Preview overlay */
  .preview-overlay { display: none; position: fixed; inset: 0; background: rgba(20,18,16,0.85); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .preview-overlay.open { display: flex; flex-direction: column; }
  .preview-inner { background: var(--card); border-radius: 20px; overflow: hidden; width: 100%; max-width: 420px; max-height: 90vh; display: flex; flex-direction: column; }
  .preview-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .preview-header span { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; color: var(--text); }
  .preview-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; padding: 4px; }
  .preview-scroll { overflow-y: auto; flex: 1; }
  .preview-canvas-wrap { padding: 12px; }
  .preview-canvas-wrap canvas { width: 100%; height: auto; display: block; border-radius: 10px; }
  .preview-actions { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .preview-actions button { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s; }
  .btn-edit { border: 1px solid var(--border); background: none; color: var(--muted); }
  .btn-edit:hover { background: var(--bg); }
  .btn-save { border: none; background: var(--accent); color: #fff; }
  .btn-save:hover { background: #c94f0e; }
  .btn-save svg, .btn-edit svg { width: 16px; height: 16px; }

  /* Photo choice sheet */
  .photo-choice-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 300; align-items: flex-end; justify-content: center; }
  .photo-choice-overlay.open { display: flex; }
  .photo-choice-sheet { background: var(--card); border-radius: 20px 20px 0 0; padding: 1.25rem 1rem 2rem; width: 100%; max-width: 480px; }
  .photo-choice-sheet h3 { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; text-align: center; margin-bottom: 1rem; color: var(--text); }
  .choice-btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 400; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; transition: background 0.15s, border-color 0.15s; }
  .choice-btn:hover { background: var(--accent-light); border-color: var(--accent-mid); }
  .choice-btn svg { width: 20px; height: 20px; color: var(--accent); flex-shrink: 0; }
  .choice-cancel { width: 100%; padding: 12px; border: none; background: none; color: var(--muted); font-family: 'Jost', sans-serif; font-size: 14px; cursor: pointer; }
  #file-camera, #file-gallery { display: none; }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>Дневник питания</h1>
    <p>фото каждого приёма — коллаж дня</p>
  </div>
</header>

<div class="container">
  <div class="date-row">
    <label>Дата</label>
    <input type="date" id="diary-date" />
  </div>
  <div id="meals-container"></div>
  <button class="add-btn" onclick="addMeal()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
    Добавить приём пищи
  </button>
  <button class="preview-btn" onclick="openPreview()">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    Предпросмотр коллажа
  </button>
  <button class="download-btn" onclick="saveCollage()">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 8.25H7.5a2.25 2.25 0 00-2.25 2.25v9a2.25 2.25 0 002.25 2.25h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25H15M9 12l3 3m0 0l3-3m-3 3V2.25"/></svg>
    Сохранить в галерею
  </button>
</div>

<!-- Preview overlay -->
<div class="preview-overlay" id="preview-overlay">
  <div class="preview-inner">
    <div class="preview-header">
      <span>Предпросмотр</span>
      <button class="preview-close" onclick="closePreview()">✕</button>
    </div>
    <div class="preview-scroll">
      <div class="preview-canvas-wrap">
        <canvas id="preview-canvas"></canvas>
      </div>
    </div>
    <div class="preview-actions">
      <button class="btn-edit" onclick="closePreview()">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>
        Изменить
      </button>
      <button class="btn-save" onclick="saveCollage()">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 8.25H7.5a2.25 2.25 0 00-2.25 2.25v9a2.25 2.25 0 002.25 2.25h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25H15M9 12l3 3m0 0l3-3m-3 3V2.25"/></svg>
        Сохранить
      </button>
    </div>
  </div>
</div>

<!-- Photo choice sheet -->
<div class="photo-choice-overlay" id="photo-overlay" onclick="closeOverlay(event)">
  <div class="photo-choice-sheet">
    <h3>Добавить фото</h3>
    <button class="choice-btn" onclick="triggerCamera()">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/></svg>
      Сделать фото
    </button>
    <button class="choice-btn" onclick="triggerGallery()">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
      Выбрать из галереи
    </button>
    <button class="choice-cancel" onclick="closeSheet()">Отмена</button>
  </div>
</div>

<input type="file" id="file-camera" accept="image/*" capture="environment" onchange="handleHiddenPhoto(event)" />
<input type="file" id="file-gallery" accept="image/*" onchange="handleHiddenPhoto(event)" />

<script>
let meals = [];
let mealCounter = 0;
let activeMealId = null;
let lastCanvas = null;

document.getElementById('diary-date').value = new Date().toISOString().split('T')[0];

function addMeal() {
  const id = ++mealCounter;
  const now = new Date();
  meals.push({ id, label: '', time: String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'), imgSrc: null });
  renderMeals();
}

const defaultNames = ['Завтрак','Перекус','Обед','Перекус 2','Ужин','Перекус 3'];

function renderMeals() {
  const container = document.getElementById('meals-container');
  container.innerHTML = '';
  meals.forEach((meal, idx) => {
    const ph = defaultNames[idx] || ('Приём ' + (idx+1));
    const card = document.createElement('div');
    card.className = 'meal-card';
    card.innerHTML = `
      <div class="photo-box" onclick="openPhotoChoice(${meal.id})">
        ${meal.imgSrc
          ? `<img src="${meal.imgSrc}" alt="Фото приёма" />`
          : `<div class="photo-placeholder">
              <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/></svg>
              <span>Добавить фото</span>
              <small>камера или галерея</small>
            </div>`
        }
      </div>
      <div class="meal-fields">
        <input type="text" placeholder="${ph}" value="${meal.label}" oninput="updateLabel(${meal.id},this.value)" />
        <div class="divider"></div>
        <input type="time" value="${meal.time}" onchange="updateTime(${meal.id},this.value)" />
        <button class="remove-btn" onclick="removeMeal(${meal.id})">✕</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function openPhotoChoice(id) { activeMealId = id; document.getElementById('photo-overlay').classList.add('open'); }
function closeSheet() { document.getElementById('photo-overlay').classList.remove('open'); activeMealId = null; }
function closeOverlay(e) { if (e.target === document.getElementById('photo-overlay')) closeSheet(); }
function triggerCamera() { document.getElementById('file-camera').click(); }
function triggerGallery() { document.getElementById('file-gallery').click(); }

function handleHiddenPhoto(event) {
  const file = event.target.files[0];
  if (!file || activeMealId === null) return;
  const reader = new FileReader();
  reader.onload = e => {
    const meal = meals.find(m => m.id === activeMealId);
    if (meal) { meal.imgSrc = e.target.result; renderMeals(); }
    closeSheet(); event.target.value = '';
  };
  reader.readAsDataURL(file);
}

function updateLabel(id, val) { const m = meals.find(m => m.id === id); if (m) m.label = val; }
function updateTime(id, val) { const m = meals.find(m => m.id === id); if (m) m.time = val; }
function removeMeal(id) { meals = meals.filter(m => m.id !== id); renderMeals(); }

function loadImage(src) {
  return new Promise((res, rej) => { const img = new Image(); img.onload = () => res(img); img.onerror = rej; img.src = src; });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawCoverImage(ctx, img, x, y, size) {
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const scale = Math.max(size/iw, size/ih);
  const sw = size/scale, sh = size/scale;
  ctx.drawImage(img, (iw-sw)/2, (ih-sh)/2, sw, sh, x, y, size, size);
}

async function buildCanvas() {
  const dateVal = document.getElementById('diary-date').value;
  const dateLabel = dateVal
    ? new Date(dateVal+'T12:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})
    : '';

  const COLS = meals.length === 1 ? 1 : 2;
  const GAP = 6, OUTER = 10, LABEL_H = 26;
  const DATE_H = dateLabel ? 36 : 0;
  const ROWS = Math.ceil(meals.length / COLS);
  const TOTAL_W = 720;
  const IMG_SIZE = Math.floor((TOTAL_W - OUTER*2 - (COLS-1)*GAP) / COLS);
  const W = OUTER*2 + COLS*IMG_SIZE + (COLS-1)*GAP;
  const H = DATE_H + OUTER + ROWS*(IMG_SIZE+LABEL_H) + (ROWS-1)*GAP + OUTER;

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#faf8f5';
  ctx.fillRect(0,0,W,H);

  if (dateLabel) {
    ctx.fillStyle = '#9a9590';
    ctx.font = '300 20px Jost, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(dateLabel.toUpperCase(), W/2, 24);
    ctx.strokeStyle = '#ede9e3'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(OUTER,31); ctx.lineTo(W-OUTER,31); ctx.stroke();
  }

  for (let i = 0; i < meals.length; i++) {
    const meal = meals[i];
    const col = i % COLS, row = Math.floor(i/COLS);
    const x = OUTER + col*(IMG_SIZE+GAP);
    const y = DATE_H + OUTER + row*(IMG_SIZE+LABEL_H+GAP);

    ctx.save();
    roundRect(ctx, x, y, IMG_SIZE, IMG_SIZE, 10);
    ctx.clip();
    if (meal.imgSrc) {
      const img = await loadImage(meal.imgSrc);
      drawCoverImage(ctx, img, x, y, IMG_SIZE);
    } else {
      ctx.fillStyle = '#f4efe8'; ctx.fillRect(x,y,IMG_SIZE,IMG_SIZE);
      ctx.fillStyle = '#c8c3bc'; ctx.font='300 16px Jost,sans-serif'; ctx.textAlign='center';
      ctx.fillText('нет фото', x+IMG_SIZE/2, y+IMG_SIZE/2+6);
    }
    ctx.restore();

    // Label · time in one row with divider
    const labelText = meal.label || defaultNames[i] || ('Приём '+(i+1));
    const baseY = y + IMG_SIZE + 19;
    ctx.textAlign = 'left';
    ctx.fillStyle = '#1c1a18';
    ctx.font = '400 15px Jost, sans-serif';
    ctx.fillText(labelText, x+2, baseY);
    const labelW = ctx.measureText(labelText).width;
    // divider
    const divX = x + 2 + labelW + 10;
    ctx.strokeStyle = '#d0ccc6'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(divX, baseY-11); ctx.lineTo(divX, baseY+2); ctx.stroke();
    // time
    ctx.fillStyle = '#e65c13';
    ctx.font = '300 13px Jost, sans-serif';
    ctx.fillText(meal.time||'', divX+10, baseY);
  }

  return canvas;
}

async function openPreview() {
  if (meals.length === 0) { alert('Сначала добавьте хотя бы один приём пищи!'); return; }
  const canvas = await buildCanvas();
  lastCanvas = canvas;
  const display = document.getElementById('preview-canvas');
  display.width = canvas.width;
  display.height = canvas.height;
  display.getContext('2d').drawImage(canvas, 0, 0);
  document.getElementById('preview-overlay').classList.add('open');
}

function closePreview() {
  document.getElementById('preview-overlay').classList.remove('open');
}

async function saveCollage() {
  if (meals.length === 0) { alert('Сначала добавьте хотя бы один приём пищи!'); return; }
  const canvas = lastCanvas || await buildCanvas();
  lastCanvas = canvas;

  canvas.toBlob(async blob => {
    const dateVal = document.getElementById('diary-date').value;
    const filename = 'дневник-' + (dateVal||'сегодня') + '.png';
    const file = new File([blob], filename, { type: 'image/png' });

    // Try Web Share API (saves to gallery on mobile)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'Дневник питания' });
        return;
      } catch(e) { /* fallback */ }
    }
    // Fallback: download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');

  closePreview();
}
